<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouTube Multi‑Viewer</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    height: 100vh;
    overflow: hidden;
  }

  /* CONTENEDOR PRINCIPAL */
  #app {
    display: flex;
    height: 100%;
    width: 100%;
  }

  /* SIDEBAR */
  #sidebar {
    width: 260px;
    background: #1a1a1a;
    padding: 10px;
    overflow-y: auto;
    border-right: 2px solid #333;
  }

  #toggleBtn {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    background: #444;
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 16px;
  }

  #inputs {
    display: none;
    margin-bottom: 10px;
  }

  #inputs input {
    width: 100%;
    margin-bottom: 5px;
    padding: 5px;
    background: #222;
    color: #eee;
    border: 1px solid #444;
  }

  /* CONTENEDOR DE MINI-VISTAS */
  #thumbContainer {
    width: 100%;
  }

  .thumbWrapper {
    position: relative;
    width: 100%;
    height: 150px;
    margin-bottom: 10px;
  }

  .thumbWrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .thumbOverlay {
    position: absolute;
    inset: 0;
    cursor: pointer;
    background: transparent;
    z-index: 10;
  }

  /* MAIN VIEW */
  #main {
    flex: 1;
    background: #000;
    position: relative;
  }

  .mainWrapper {
    width: 100%;
    height: 100%;
    position: relative;
  }

  .mainWrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>

<body>

<div id="app">

  <div id="sidebar">
    <button id="toggleBtn">Show/Hide URL Inputs (1.5)</button>
    <div id="inputs"></div>
    <div id="thumbContainer"></div>
  </div>

  <div id="main">
    <div id="mainContainer"></div>
  </div>

</div>

<script>
  const inputsDiv = document.getElementById("inputs");
  const thumbContainer = document.getElementById("thumbContainer");
  const mainContainer = document.getElementById("mainContainer");

  const videoFrames = Array(20).fill(null);
  let mainIndex = null;

  /* Crear 20 inputs */
  for (let i = 0; i < 20; i++) {
    const input = document.createElement("input");
    input.placeholder = "YouTube URL " + (i + 1);
    input.dataset.index = i;
    input.addEventListener("change", () => loadVideo(i));
    inputsDiv.appendChild(input);
  }

  /* Toggle inputs */
  document.getElementById("toggleBtn").onclick = () => {
    inputsDiv.style.display = inputsDiv.style.display === "none" ? "block" : "none";
  };

  /* Convertir URL → embed */
  function toEmbed(url) {
    try {
      const u = new URL(url);
      let id = null;

      if (u.searchParams.get("v")) id = u.searchParams.get("v");
      if (!id && u.hostname === "youtu.be") id = u.pathname.slice(1);
      if (!id && u.pathname.startsWith("/live/"))
        id = u.pathname.split("/live/")[1].split("/")[0];

      return id
        ? `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&enablejsapi=1`
        : "";
    } catch {
      return "";
    }
  }

  /* Cargar vídeo */
  function loadVideo(index) {
    const url = inputsDiv.querySelector(`input[data-index="${index}"]`).value.trim();
    if (!url) return;

    let frameObj = videoFrames[index];

    if (!frameObj) {
      const wrapper = document.createElement("div");
      wrapper.dataset.index = index;

      const iframe = document.createElement("iframe");
      iframe.allow = "autoplay";

      const overlay = document.createElement("div");
      overlay.className = "thumbOverlay";
      overlay.onclick = () => setMain(index);

      wrapper.appendChild(iframe);
      wrapper.appendChild(overlay);

      videoFrames[index] = { wrapper, iframe, overlay };
      frameObj = videoFrames[index];
    }

    frameObj.iframe.src = toEmbed(url);

    if (mainIndex === null) {
      mainIndex = index;
    }

    renderLayout();
  }

  /* Cambiar vídeo principal */
  function setMain(index) {
    mainIndex = index;
    renderLayout();
  }

  /* Renderizar layout */
  function renderLayout() {
    thumbContainer.innerHTML = "";
    mainContainer.innerHTML = "";

    videoFrames.forEach((frameObj, index) => {
      if (!frameObj) return;

      const { wrapper, iframe, overlay } = frameObj;
      const url = inputsDiv.querySelector(`input[data-index="${index}"]`).value.trim();
      if (!url) return;

      if (index === mainIndex) {
        wrapper.className = "mainWrapper";
        mainContainer.appendChild(wrapper);

        overlay.style.display = "none";

        try {
          iframe.contentWindow.postMessage(
            '{"event":"command","func":"unMute","args":""}',
            "*"
          );
        } catch (e) {}
      } else {
        wrapper.className = "thumbWrapper";
        thumbContainer.appendChild(wrapper);

        overlay.style.display = "block";

        try {
          iframe.contentWindow.postMessage(
            '{"event":"command","func":"mute","args":""}',
            "*"
          );
        } catch (e) {}
      }
    });
  }
</script>

</body>
</html>
