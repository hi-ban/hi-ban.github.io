<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouTube Multi‑Viewer</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  #sidebar {
    width: 260px;
    background: #1a1a1a;
    padding: 10px;
    overflow-y: auto;
    border-right: 2px solid #333;
  }

  #main {
    flex: 1;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  iframe {
    border: none;
  }

  .thumbWrapper {
    position: relative;
    width: 100%;
    height: 150px;
    margin-bottom: 10px;
  }

  .thumb {
    width: 100%;
    height: 100%;
  }

  .thumbOverlay {
    position: absolute;
    inset: 0;
    cursor: pointer;
    background: transparent;
    z-index: 10;
  }

  #toggleBtn {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    background: #444;
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 16px;
  }

  #inputs {
    display: none;
    margin-bottom: 10px;
  }

  #inputs input {
    width: 100%;
    margin-bottom: 5px;
    padding: 5px;
    background: #222;
    color: #eee;
    border: 1px solid #444;
  }

  #mainContainer {
    width: 100%;
    height: 100%;
  }

  .mainWrapper {
    width: 100%;
    height: 100%;
    position: relative;
  }

  .mainWrapper iframe {
    width: 100%;
    height: 100%;
  }
</style>
</head>

<body>

<div id="sidebar">
  <button id="toggleBtn">Show/Hide URL Inputs</button>

  <div id="inputs"></div>

  <div id="thumbContainer"></div>
</div>

<div id="main">
  <div id="mainContainer"></div>
</div>

<script>
  const inputsDiv = document.getElementById("inputs");
  const thumbContainer = document.getElementById("thumbContainer");
  const mainContainer = document.getElementById("mainContainer");

  // Create 20 input fields
  for (let i = 0; i < 20; i++) {
    const input = document.createElement("input");
    input.placeholder = "YouTube URL " + (i + 1);
    input.dataset.index = i;
    input.addEventListener("change", () => renderViews(null));
    inputsDiv.appendChild(input);
  }

  // Toggle input visibility
  document.getElementById("toggleBtn").onclick = () => {
    inputsDiv.style.display = inputsDiv.style.display === "none" ? "block" : "none";
  };

  // Convert YouTube URL → embed URL with autoplay
  function toEmbed(url) {
    try {
      const u = new URL(url);
      let id = null;

      if (u.searchParams.get("v")) id = u.searchParams.get("v");
      if (!id && u.hostname === "youtu.be") id = u.pathname.slice(1);
      if (!id && u.pathname.startsWith("/live/"))
        id = u.pathname.split("/live/")[1].split("/")[0];

      return id
        ? `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&mute=1`
        : "";
    } catch {
      return "";
    }
  }

  // Render all views: one main, rest sidebar
  // selectedIndex === null → first valid becomes main
  // selectedIndex === i   → that index becomes main
  function renderViews(selectedIndex) {
    thumbContainer.innerHTML = "";
    mainContainer.innerHTML = "";

    const inputs = [...inputsDiv.querySelectorAll("input")];
    const urls = inputs.map(i => i.value);

    let mainSet = false;

    urls.forEach((url, index) => {
      if (!url.trim()) return;

      const embed = toEmbed(url);
      if (!embed) return;

      const wrapper = document.createElement("div");
      const iframe = document.createElement("iframe");
      iframe.src = embed;

      if (selectedIndex === null) {
        // First render: first valid becomes main, rest sidebar
        if (!mainSet) {
          wrapper.className = "mainWrapper";
          wrapper.appendChild(iframe);
          mainContainer.appendChild(wrapper);
          mainSet = true;
        } else {
          wrapper.className = "thumbWrapper";
          iframe.className = "thumb";

          const overlay = document.createElement("div");
          overlay.className = "thumbOverlay";
          overlay.onclick = () => renderViews(index);

          wrapper.appendChild(iframe);
          wrapper.appendChild(overlay);
          thumbContainer.appendChild(wrapper);
        }
      } else {
        // Re-render: selectedIndex becomes main, others sidebar
        if (index === selectedIndex) {
          wrapper.className = "mainWrapper";
          wrapper.appendChild(iframe);
          mainContainer.appendChild(wrapper);
        } else {
          wrapper.className = "thumbWrapper";
          iframe.className = "thumb";

          const overlay = document.createElement("div");
          overlay.className = "thumbOverlay";
          overlay.onclick = () => renderViews(index);

          wrapper.appendChild(iframe);
          wrapper.appendChild(overlay);
          thumbContainer.appendChild(wrapper);
        }
      }
    });
  }

  // Initial render (no selection yet → first valid goes main)
  renderViews(null);
</script>

</body>
</html>
