<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouTube Multi‑Viewer</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  #sidebar {
    width: 260px;
    background: #1a1a1a;
    padding: 10px;
    overflow-y: auto;
    border-right: 2px solid #333;
  }

  #main {
    flex: 1;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  iframe {
    border: none;
  }

  .thumb {
    width: 100%;
    height: 150px;
    margin-bottom: 10px;
    cursor: pointer;
    background: #000;
  }

  #toggleBtn {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    background: #444;
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 16px;
  }

  #inputs {
    display: none;
    margin-bottom: 10px;
  }

  #inputs input {
    width: 100%;
    margin-bottom: 5px;
    padding: 5px;
    background: #222;
    color: #eee;
    border: 1px solid #444;
  }
</style>
</head>

<body>

<div id="sidebar">
  <button id="toggleBtn">Show/Hide URL Inputs</button>

  <div id="inputs"></div>

  <div id="thumbContainer"></div>
</div>

<div id="main">
  <iframe id="mainPlayer" width="100%" height="100%" src="" allowfullscreen></iframe>
</div>

<script>
  const inputsDiv = document.getElementById("inputs");
  const thumbContainer = document.getElementById("thumbContainer");
  const mainPlayer = document.getElementById("mainPlayer");

  // Create 20 input fields
  for (let i = 0; i < 20; i++) {
    const input = document.createElement("input");
    input.placeholder = "YouTube URL " + (i + 1);
    input.dataset.index = i;
    input.addEventListener("change", updateThumbs);
    inputsDiv.appendChild(input);
  }

  // Toggle input visibility
  document.getElementById("toggleBtn").onclick = () => {
    inputsDiv.style.display = inputsDiv.style.display === "none" ? "block" : "none";
  };

  // Convert YouTube URL → embed URL
  /*function toEmbed(url) {
    try {
      const id = url.split("v=")[1]?.split("&")[0] ||
                 url.split("youtu.be/")[1]?.split("?")[0];
      return id ? `https://www.youtube.com/embed/${id}` : "";
    } catch {
      return "";
    }
  }*/

  function toEmbed(url) {
    try {
      const u = new URL(url);

      let id = null;

      // watch?v=ID
      if (u.searchParams.get("v")) {
        id = u.searchParams.get("v");
      }

      // youtu.be/ID
      if (!id && u.hostname === "youtu.be") {
        id = u.pathname.slice(1);
      }

      // /live/ID
      if (!id && u.pathname.startsWith("/live/")) {
        id = u.pathname.split("/live/")[1].split("/")[0];
      }

      return id ? `https://www.youtube-nocookie.com/embed/${id}` : "";
    } catch {
      return "";
    }
  }

  // Update thumbnails when URLs change
  function updateThumbs() {
    thumbContainer.innerHTML = "";

    const urls = [...inputsDiv.querySelectorAll("input")].map(i => i.value);

    urls.forEach((url, index) => {
      if (!url.trim()) return;

      const embed = toEmbed(url);
      if (!embed) return;

      const iframe = document.createElement("iframe");
      iframe.src = embed;
      iframe.className = "thumb";
      iframe.dataset.index = index;

      iframe.onclick = () => swapToMain(index);

      thumbContainer.appendChild(iframe);

      // If main player is empty, load the first one
      if (mainPlayer.src === "" || mainPlayer.src.includes("about:blank")) {
        mainPlayer.src = embed;
      }
    });
  }

  // Swap clicked thumb with main player
  function swapToMain(index) {
    const input = inputsDiv.querySelector(`input[data-index="${index}"]`);
    const embed = toEmbed(input.value);

    if (!embed) return;

    // Move current main player into sidebar
    if (mainPlayer.src) {
      const oldIframe = document.createElement("iframe");
      oldIframe.src = mainPlayer.src;
      oldIframe.className = "thumb";
      oldIframe.onclick = () => {
        const oldUrl = mainPlayer.src;
        mainPlayer.src = oldIframe.src;
        oldIframe.src = oldUrl;
      };
      thumbContainer.appendChild(oldIframe);
    }

    // Set new main player
    mainPlayer.src = embed;

    // Refresh sidebar (remove duplicates)
    updateThumbs();
  }
</script>

</body>
</html>
