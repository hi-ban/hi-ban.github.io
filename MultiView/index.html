<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouTube Multi‑Viewer</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  #sidebar {
    width: 260px;
    background: #1a1a1a;
    padding: 10px;
    overflow-y: auto;
    border-right: 2px solid #333;
  }

  #main {
    flex: 1;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  iframe {
    border: none;
  }

  .thumbWrapper {
    position: relative;
    width: 100%;
    height: 150px;
    margin-bottom: 10px;
  }

  .thumb {
    width: 100%;
    height: 100%;
  }

  .thumbOverlay {
    position: absolute;
    inset: 0;
    cursor: pointer;
    background: transparent;
    z-index: 10;
  }

  #toggleBtn {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    background: #444;
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 16px;
  }

  #inputs {
    display: none;
    margin-bottom: 10px;
  }

  #inputs input {
    width: 100%;
    margin-bottom: 5px;
    padding: 5px;
    background: #222;
    color: #eee;
    border: 1px solid #444;
  }

  #mainContainer {
    width: 100%;
    height: 100%;
  }

  .mainWrapper {
    width: 100%;
    height: 100%;
    position: relative;
  }

  .mainWrapper iframe {
    width: 100%;
    height: 100%;
  }
</style>
</head>

<body>

<div id="sidebar">
  <button id="toggleBtn">Show/Hide URL Inputs (1.1)</button>

  <div id="inputs"></div>

  <div id="thumbContainer"></div>
</div>

<div id="main">
  <div id="mainContainer"></div>
</div>

<script>
  const inputsDiv = document.getElementById("inputs");
  const thumbContainer = document.getElementById("thumbContainer");
  const mainContainer = document.getElementById("mainContainer");

  // Store iframes so they are never recreated
  const videoFrames = Array(20).fill(null);

  // Create 20 input fields
  for (let i = 0; i < 20; i++) {
    const input = document.createElement("input");
    input.placeholder = "YouTube URL " + (i + 1);
    input.dataset.index = i;
    input.addEventListener("change", () => loadVideo(i));
    inputsDiv.appendChild(input);
  }

  // Toggle input visibility
  document.getElementById("toggleBtn").onclick = () => {
    inputsDiv.style.display = inputsDiv.style.display === "none" ? "block" : "none";
  };

  // Convert YouTube URL → embed URL
  function toEmbed(url, muted) {
    try {
      const u = new URL(url);
      let id = null;

      if (u.searchParams.get("v")) id = u.searchParams.get("v");
      if (!id && u.hostname === "youtu.be") id = u.pathname.slice(1);
      if (!id && u.pathname.startsWith("/live/"))
        id = u.pathname.split("/live/")[1].split("/")[0];

      if (!id) return "";

      return `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&mute=${muted ? 1 : 0}`;
    } catch {
      return "";
    }
  }

  // Load or update a video iframe
  function loadVideo(index) {
    const url = inputsDiv.querySelector(`input[data-index="${index}"]`).value;
    if (!url.trim()) return;

    let iframe = videoFrames[index];

    if (!iframe) {
      iframe = document.createElement("iframe");
      videoFrames[index] = iframe;
    }

    // Always muted in sidebar initially
    iframe.src = toEmbed(url, true);

    renderLayout();
  }

  // Render layout: one main, rest sidebar
  function renderLayout(selectedIndex = null) {
    thumbContainer.innerHTML = "";
    mainContainer.innerHTML = "";

    const inputs = [...inputsDiv.querySelectorAll("input")];

    let mainSet = false;

    inputs.forEach((input, index) => {
      const url = input.value.trim();
      if (!url) return;

      const iframe = videoFrames[index];
      if (!iframe) return;

      const wrapper = document.createElement("div");

      if (selectedIndex === null) {
        // First render: first valid goes main
        if (!mainSet) {
          wrapper.className = "mainWrapper";
          iframe.src = toEmbed(url, false); // unmuted
          wrapper.appendChild(iframe);
          mainContainer.appendChild(wrapper);
          mainSet = true;
        } else {
          wrapper.className = "thumbWrapper";
          iframe.src = toEmbed(url, true); // muted
          iframe.className = "thumb";

          const overlay = document.createElement("div");
          overlay.className = "thumbOverlay";
          overlay.onclick = () => renderLayout(index);

          wrapper.appendChild(iframe);
          wrapper.appendChild(overlay);
          thumbContainer.appendChild(wrapper);
        }
      } else {
        // Re-render: selectedIndex goes main
        if (index === selectedIndex) {
          wrapper.className = "mainWrapper";
          iframe.src = toEmbed(url, false); // unmuted
          wrapper.appendChild(iframe);
          mainContainer.appendChild(wrapper);
        } else {
          wrapper.className = "thumbWrapper";
          iframe.src = toEmbed(url, true); // muted
          iframe.className = "thumb";

          const overlay = document.createElement("div");
          overlay.className = "thumbOverlay";
          overlay.onclick = () => renderLayout(index);

          wrapper.appendChild(iframe);
          wrapper.appendChild(overlay);
          thumbContainer.appendChild(wrapper);
        }
      }
    });
  }

  // Initial render
  renderLayout(null);
</script>

</body>
</html>
