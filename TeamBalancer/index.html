<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouTube Multi‑Viewer</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    height: 100vh;
    overflow: hidden;
  }

  #sidebar {
    position: absolute;
    top: 0;
    left: 0;
    width: 260px;
    height: 100%;
    background: #1a1a1a;
    padding: 10px;
    overflow-y: auto;
    border-right: 2px solid #333;
    z-index: 100;
  }

  #toggleBtn {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    background: #444;
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 16px;
  }

  #inputs {
    display: none;
    margin-bottom: 10px;
  }

  #inputs input {
    width: 100%;
    margin-bottom: 5px;
    padding: 5px;
    background: #222;
    color: #eee;
    border: 1px solid #444;
  }

  #videoLayer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none; /* overlays handle clicks */
  }

  .videoFrame {
    position: absolute;
    pointer-events: auto;
  }

  .thumbOverlay {
    position: absolute;
    inset: 0;
    cursor: pointer;
    background: transparent;
    z-index: 10;
  }
</style>
</head>

<body>

<div id="sidebar">
  <button id="toggleBtn">Show/Hide URL Inputs (1.2)</button>
  <div id="inputs"></div>
</div>

<div id="videoLayer"></div>

<script>
  const inputsDiv = document.getElementById("inputs");
  const videoLayer = document.getElementById("videoLayer");

  const videoFrames = Array(20).fill(null);
  let mainIndex = null;

  // Create 20 input fields
  for (let i = 0; i < 20; i++) {
    const input = document.createElement("input");
    input.placeholder = "YouTube URL " + (i + 1);
    input.dataset.index = i;
    input.addEventListener("change", () => loadVideo(i));
    inputsDiv.appendChild(input);
  }

  // Toggle input visibility
  document.getElementById("toggleBtn").onclick = () => {
    inputsDiv.style.display = inputsDiv.style.display === "none" ? "block" : "none";
  };

  function toEmbed(url) {
    try {
      const u = new URL(url);
      let id = null;

      if (u.searchParams.get("v")) id = u.searchParams.get("v");
      if (!id && u.hostname === "youtu.be") id = u.pathname.slice(1);
      if (!id && u.pathname.startsWith("/live/"))
        id = u.pathname.split("/live/")[1].split("/")[0];

      return id ? `https://www.youtube-nocookie.com/embed/${id}?autoplay=1` : "";
    } catch {
      return "";
    }
  }

  function loadVideo(index) {
    const url = inputsDiv.querySelector(`input[data-index="${index}"]`).value.trim();
    if (!url) return;

    let iframe = videoFrames[index];

    if (!iframe) {
      iframe = document.createElement("iframe");
      iframe.className = "videoFrame";
      iframe.allow = "autoplay";
      videoFrames[index] = iframe;

      const overlay = document.createElement("div");
      overlay.className = "thumbOverlay";
      overlay.onclick = () => setMain(index);
      iframe.overlay = overlay;

      videoLayer.appendChild(iframe);
      videoLayer.appendChild(overlay);
    }

    iframe.src = toEmbed(url);

    if (mainIndex === null) {
      mainIndex = index;
    }

    renderPositions();
  }

  function setMain(index) {
    mainIndex = index;
    renderPositions();
  }

  function renderPositions() {
    let sidebarY = 60;

    videoFrames.forEach((iframe, index) => {
      if (!iframe) return;

      const overlay = iframe.overlay;

      if (index === mainIndex) {
        iframe.style.left = "260px";
        iframe.style.top = "0px";
        iframe.style.width = "calc(100% - 260px)";
        iframe.style.height = "100%";

        overlay.style.left = "260px";
        overlay.style.top = "0px";
        overlay.style.width = "calc(100% - 260px)";
        overlay.style.height = "100%";

        iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', "*");
      } else {
        iframe.style.left = "0px";
        iframe.style.top = sidebarY + "px";
        iframe.style.width = "260px";
        iframe.style.height = "150px";

        overlay.style.left = "0px";
        overlay.style.top = sidebarY + "px";
        overlay.style.width = "260px";
        overlay.style.height = "150px";

        iframe.contentWindow.postMessage('{"event":"command","func":"mute","args":""}', "*");

        sidebarY += 160;
      }
    });
  }
</script>

</body>
</html>
